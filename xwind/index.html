<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crosswind Component Explainer</title>
  <meta name="description" content="An interactive explainer for reading the aviation crosswind component chart — wind relative to the runway, headwind &amp; crosswind components, gusts, tailwinds, and windsocks, with a guided tour." />
  <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Crosswind Component Explainer" />
  <meta property="og:description" content="Learn to read a crosswind component chart — interactive, with a live runway scene, windsocks, gusts, and a guided tour." />
  <meta property="og:image" content="https://matthewdhull.github.io/images/xwind-teaser.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="stylesheet" href="./css/style.css" />
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(', '\\)']], displayMath: [['\\[', '\\]']] },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'] },
    };
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
  </script>
</head>
<body>
  <header class="xw-header">
    <h1>Crosswind Component Explainer</h1>
    <p class="xw-sub">Learn to use a crosswind component chart to interpret the wind relative to the runway.</p>
    <button id="xw-tour-btn" class="xw-tour-btn">&#9654; Guided tour</button>
    <button id="xw-theme-toggle" class="xw-theme-toggle" title="Toggle dark mode" aria-label="Toggle dark mode">&#9790;</button>
  </header>

  <main class="xw-main">
    <!-- LEFT: the classic crosswind component chart (self-drawing on load) -->
    <section class="xw-card xw-chart-card" aria-label="Crosswind component chart">
      <svg id="xw-chart" viewBox="0 0 600 600" role="img" aria-label="Crosswind component chart"></svg>
      <p class="xw-chart-hint">Interactive &mdash; click an angle, or drag the point and its handles.</p>
    </section>

    <!-- RIGHT: runway scene (2D placeholder in phase 1, three.js in phase 3) -->
    <section class="xw-card xw-runway-card" aria-label="Runway scene">
      <div class="xw-runway-stage">
        <canvas id="xw-field" class="xw-field"></canvas>
        <svg id="xw-runway" viewBox="-200 -200 400 400" class="xw-runway"></svg>
        <canvas id="xw-socks3d" class="xw-socks3d"></canvas>
      </div>
      <p class="xw-runway-caption" id="xw-runway-caption">RWY 02/20 &middot; wind 040/15</p>
    </section>
  </main>

  <!-- CONTROLS -->
  <section class="xw-controls" aria-label="Controls">
    <div class="xw-control">
      <label for="ctl-heading">Runway heading <span class="xw-val" id="val-heading">020&deg;</span></label>
      <input type="range" id="ctl-heading" min="0" max="360" step="10" value="20" />
    </div>
    <div class="xw-control">
      <label for="ctl-winddir">Wind direction <span class="xw-val" id="val-winddir">040&deg;</span></label>
      <input type="range" id="ctl-winddir" min="0" max="360" step="5" value="40" />
    </div>
    <div class="xw-control">
      <label for="ctl-windspd">Wind speed <span class="xw-val" id="val-windspd">15 kt</span></label>
      <input type="range" id="ctl-windspd" min="0" max="40" step="1" value="15" />
    </div>
    <div class="xw-control locked">
      <label for="ctl-windgust">Wind gust
        <button type="button" id="xw-gust-lock" class="xw-gust-lock" title="Unlock to set a gust" aria-label="Lock or unlock gust">&#128274;</button>
        <span class="xw-val" id="val-windgust">&mdash;</span>
      </label>
      <input type="range" id="ctl-windgust" min="0" max="40" step="1" value="15" disabled />
    </div>
    <div class="xw-readout" id="xw-readout" aria-live="polite"></div>
  </section>

  <!-- load with a cache-buster so edits to main.js always show on refresh -->
  <script type="module">import("./js/main.js?v=" + Date.now());</script>
</body>
</html>
